<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DibiTech</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300..700;1,300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Space+Grotesk:wght@300..700&family=Syne:wght@400..800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
  </head>
  <body class="bg-color-[rgb(18, 20, 33)]">
    <main class="flex items-center justify-center">
      <div class="container-login bg-indigo-50/50 shaodow-lg shadow-sky-500/50 rounded-md min-w-3/4 h-[300px] items-center">
          <img
          class="logo shadow-md shadow-sky-500"
          src="https://img.freepik.com/premium-vector/letter-d-logo-icon-design-template_487414-4337.jpg"
          alt=""
        />
        <div class="welcome-login">
            <h1>Welcome Back</h1>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quidem quisquam consequuntur molestias neque reiciendis incidunt.</p>
        </div>
        <div class="input-container">
            <input
            type="email"
            required
            placeholder="name@email.com"
            class="bg-indigo-950 outline-none text-white placeholder-white/50"
          />
          <input
            type="password"
            required
            class="bg-blue-500 outline-none text-white placeholder-white/50"
          />
        </div>
      </div>
    </main>
  </body>
</html>
