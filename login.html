<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DibiTech</title>
    <link rel="stylesheet" href="style2.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300..700;1,300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Space+Grotesk:wght@300..700&family=Syne:wght@400..800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
  </head>
  <body class="bg-gradient-to-br from-[#121421] via-[#1c1a2e] to-[#0e1020]">
    <main class="min-h-[100vh] flex items-center justify-center p-8">
      <div
        class="p-4 bg-indigo-50/20 ring-1 ring-white/10 shadow-lg shadow-sky-500/20 rounded-[25px] min-w-[350px] min-h-[400px] flex justify-center flex-col items-center md:min-w-[400px]"
      >
        <img
          class="logo shadow-sm shadow-sky-500 max-w-[45px] rounded-full mb-4"
          src="https://img.freepik.com/premium-vector/letter-d-logo-icon-design-template_487414-4337.jpg"
          alt=""
        />
        <div class="welcome-login flex flex-col max-w-[80%]">
          <h1 class="text-white text-2xl font-bold text-center mb-2">
            Welcome Back
          </h1>
          <p class="text-sm text-secondary-color text-center mb-8">
            Lorem ipsum dolor sit amet.
          </p>
        </div>
        <div class="md:min-w-[70%]">
          <div class="flex flex-col gap-1 mb-4">
            <label for="email" class="text-xs text-white/50">Email</label>
            <input
              id="email"
              type="email"
              required
              placeholder="Your email"
              class="p-2 bg-indigo-950 rounded-[10px] w-full outline-none text-white text-sm placeholder-white/50 border border-white/10 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all"
            />
          </div>

          <div class="flex flex-col gap-1">
            <label for="password" class="text-xs text-white/50">Password</label>
            <input
              id="password"
              type="password"
              required
              placeholder="••••••••"
              class="p-2 bg-indigo-950 rounded-[10px] w-full outline-none text-white text-sm placeholder-white/50 border border-white/10 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all"
            />
          </div>
          <div
            class="input-2-container flex gap-5 justify-end items-center w-full mt-1 mb-8"
          >
            <a class="pl-2 text-blue-400 text-[10px]" href="#">Forgot your password?</a>
          </div>
            <button class="button-container w-full bg-blue-700 p-2 my-2 rounded-md text-center text-md font-bold text-white transition duration-150 ease-in hover:scale-105 hover:bg-blue-950">Login</button>
          <div class="platform-login">
            <p class="mt-8 text-sm text-white text-center">Or Sign in With</p>
            <div class="flex gap-12 justify-center mt-6 mb-8">
              <button
                id="login-google"
                class="max-w-[45px] rounded-full shadow-sm shadow-sky-50 transition duration-150 hover:scale-105"
              >
                <img
                  class="rounded-full"
                  src="./assets/logo-google.png"
                  alt=""
                />
              </button>
              <button class="max-w-[45px] rounded-full shadow-sm shadow-sky-50 transition duration-150 hover:scale-105">
                <img
                  class="rounded-full"
                  src="./assets/apple-logo.png"
                  alt=""
                />
              </button>
              <button class="max-w-[45px] rounded-full shadow-sm shadow-sky-50 transition duration-150 hover:scale-105">
                <img
                  class="rounded-full"
                  src="./assets/microsoft-logo.png"
                  alt=""
                />
              </button>
            </div>
            <p class="text-sm text-white/50 text-center mb-4">
              Don't have an account?
              <a
                href="#"
                class="text-indigo-400 hover:text-indigo-300 transition-colors"
                >Sign Up</a
              >
            </p>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
